version: '3.8'

services:
  monitoring_hub:
    image: jimmy1998/monitoring-hub:latest  
    ports: 
      - "4000:80"
    environment:
      # ===== Database mode =====
      # existing = ใช้ DB ที่มีอยู่แล้ว ไม่แก้ schema
      # init     = DB ใหม่ว่าง ๆ → prisma db push + seed
      # migrate  = ใช้ prisma migrate deploy
      # fresh    = ล้าง DB แล้วสร้างใหม่ + seed
      DB_MODE: "existing"
      
      # dev or production
      NODE_ENV: production
      HOST: 0.0.0.0

      # ===== Database =====
      DATABASE_URL: "postgresql://username:password@host:port/mydb?schema=public"

      # ===== JWT =====
      JWT_SECRET: dev-secret-change-this-in-production-use-openssl-rand-hex-64

      # ===== CORS =====
      # production: ใส่ domain จริง เช่น https://yourdomain.com
      # หลาย origin คั่นด้วย comma: https://app.com,https://admin.app.com
      CORS_ORIGINS: https://monitoring.jarudat.com

    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    
    networks:
      - main_public

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
    
volumes:
  uploads_data:
  logs_data:
    
networks:
  main_public:
    external: true