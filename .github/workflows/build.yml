# .github/workflows/docker-image.yml
name: Build and Deploy to Docker Hub

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # เพิ่มบรรทัดนี้เพื่อให้เรียกได้จาก API

jobs:
  build-and-push:
    runs-on: ubuntu-latest
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
     
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
     
    - name: Extract version from package.json
      id: package-version
      run: |
        if [ -f package.json ]; then
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Found version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          echo "package.json not found, using fallback"
          echo "version=latest" >> $GITHUB_OUTPUT
        fi
     
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_HUB_USERNAME }}/files_system_nova_api
        tags: |
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.package-version.outputs.version }},enable={{is_default_branch}}
     
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Send Telegram Notification
      if: success()
      run: |
        TELEGRAM_BOT_TOKEN="8149217522:AAGDTRlLPxi5otaHqquBb_TL9F8SRNOD8zA"
        TELEGRAM_CHAT_ID="-4630731433"
        
        # รับ tags ที่ build
        TAGS="${{ steps.meta.outputs.tags }}"
        VERSION="${{ steps.package-version.outputs.version }}"
        
        MESSAGE="🐳 <b>Docker Build Completed!</b>%0A%0A📂 Repo: ${{ github.repository }}%0A🏷️ Version: ${VERSION}%0A🔄 Platforms: linux/amd64, linux/arm64%0A%0A✅ Built successfully%0A✅ Pushed to Docker Hub%0A🚀 Ready for deployment%0A%0A📦 Tags:%0A${TAGS}%0A%0A🕐 $(date '+%H:%M %d/%m/%Y')"
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML"
          
    - name: Send Telegram Error Notification
      if: failure()
      run: |
        TELEGRAM_BOT_TOKEN="8149217522:AAGDTRlLPxi5otaHqquBb_TL9F8SRNOD8zA"
        TELEGRAM_CHAT_ID="-4630731433"
        
        MESSAGE="❌ <b>Docker Build Failed!</b>%0A%0A📂 Repo: ${{ github.repository }}%0A🔴 Build failed%0A%0A🔗 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0A🕐 $(date '+%H:%M %d/%m/%Y')"
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML"