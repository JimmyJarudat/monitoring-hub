name: Deploy Docker

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy dev to main
    if: contains(github.event.head_commit.message, 're deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read frontend version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "Found version: $VERSION"
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Merge dev into main
        id: merge
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          CLEAN_MSG=$(echo "${COMMIT_MSG}" | sed 's/re deploy//gi' | xargs)
          git merge origin/dev --no-ff -X theirs -m "chore: deploy — ${CLEAN_MSG}"
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "nothing to merge"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git push origin main
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Recreate dev from main
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          git push origin --delete dev
          git branch -D dev
          git checkout -b dev
          git push origin dev

      - name: Send Merge Notification (LINE)
        if: steps.merge.outputs.has_changes == 'true'
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_USER_OR_GROUP_ID }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MSG: ${{ github.event.head_commit.message }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          TEXT="$(printf '🚀 Merge Completed!\n\n📂 Repo: %s\n🌿 dev → main\n👤 %s\n💬 %s\n\n✅ Merged to main\n✅ Recreated dev branch\n🐳 Starting Docker build...\n🏷️ Version: %s\n\n🕐 %s' \
            "${REPO}" "${AUTHOR}" "${MSG}" "${VERSION}" "$(date '+%H:%M %d/%m/%Y')")"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n --arg to "${LINE_TO}" --arg text "${TEXT}" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"

      - name: Set up Docker Buildx
        if: steps.merge.outputs.has_changes == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.merge.outputs.has_changes == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.merge.outputs.has_changes == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/monitoring-hub
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and Push Docker image
        if: steps.merge.outputs.has_changes == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy Portainer Stack
        if: success() && steps.merge.outputs.has_changes == 'true'
        id: redeploy
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          # Step 1: ดึง stack content (เหมือน Invoke-RestMethod ดึง StackFileContent)
          STACK_CONTENT=$(curl -s -X GET "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}/file" \
            -H "X-API-Key: ${PORTAINER_API_KEY}" | jq '.StackFileContent')

          echo "Stack fetched OK"

          # Step 2: Redeploy (เหมือน Invoke-RestMethod PUT พร้อม body)
          RESPONSE=$(curl -s -X PUT "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}?endpointId=${PORTAINER_ENDPOINT_ID}" \
            -H "X-API-Key: ${PORTAINER_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary "{\"stackFileContent\": ${STACK_CONTENT}, \"pullImage\": true, \"prune\": true}")

          echo "Response: $RESPONSE"

          echo "Waiting 15s for service to stabilize..."
          sleep 15

      - name: Send Success Notification (LINE)
        if: success() && steps.merge.outputs.has_changes == 'true'
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_USER_OR_GROUP_ID }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MSG: ${{ github.event.head_commit.message }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          TEXT="$(printf '🎉 Deploy Completed!\n\n📂 Repo: %s\n🌿 dev → main\n👤 %s\n💬 %s\n\n✅ Merged to main\n✅ Recreated dev branch\n🐳 Docker built & pushed\n🚀 Portainer redeployed\n🏷️ Version: %s\n\n🕐 %s' \
            "${REPO}" "${AUTHOR}" "${MSG}" "${VERSION}" "$(date '+%H:%M %d/%m/%Y')")"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n --arg to "${LINE_TO}" --arg text "${TEXT}" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"

      - name: Send Error Notification (LINE)
        if: failure()
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_USER_OR_GROUP_ID }}
          REPO: ${{ github.repository }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TEXT="$(printf '❌ Deploy Failed!\n\n📂 Repo: %s\n💬 %s\n\n🔴 Logs: https://github.com/%s/actions/runs/%s\n\n🕐 %s' \
            "${REPO}" "${MSG}" "${REPO}" "${RUN_ID}" "$(date '+%H:%M %d/%m/%Y')")"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n --arg to "${LINE_TO}" --arg text "${TEXT}" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"